general:
  debug: false
  instance_name: "SearXNG"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true
  open_metrics: ''

brand:
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues

search:
  safe_search: 0
  autocomplete: ""
  autocomplete_min: 4
  favicon_resolver: ""
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 180
    SearxEngineCaptcha: 3600
    SearxEngineTooManyRequests: 180
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json

server:
  port: 8899
  bind_address: "127.0.0.1"
  base_url: "https://nikfce.xin/search"  # "http://example.com/location"
  limiter: false
  public_instance: false

  secret_key: "a41df1bd61c99b34b4475562ae413180982d199a22cc2c81ab68fbebc2c25d74"  # Is overwritten by ${SEARXNG_SECRET}
  image_proxy: false
  http_protocol_version: "1.0"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

valkey:
  url: false

ui:
  static_path: ""
  templates_path: ""
  query_in_title: false
  default_theme: simple
  center_alignment: false
  default_locale: ""
  theme_args:
    simple_style: auto
  search_on_category_select: true
  hotkeys: default
  url_formatting: pretty
outgoing:
  request_timeout: 8.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
plugins:

  searx.plugins.calculator.SXNGPlugin:
    active: true

  searx.plugins.infinite_scroll.SXNGPlugin:
    active: false

  searx.plugins.hash_plugin.SXNGPlugin:
    active: true

  searx.plugins.self_info.SXNGPlugin:
    active: true

  searx.plugins.unit_converter.SXNGPlugin:
    active: true

  searx.plugins.ahmia_filter.SXNGPlugin:
    active: true

  searx.plugins.hostnames.SXNGPlugin:
    active: true

  searx.plugins.time_zone.SXNGPlugin:
    active: true

  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: false

  searx.plugins.tor_check.SXNGPlugin:
    active: false

  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

  tech_boost.SXNGPlugin:
    active: true


categories_as_tabs:
  general:
  images:
  videos:
  news:
  map:
  music:
  it:
  science:
  files:
  social media:

engines:
  # Bing
  - name: bing
    engine: bing
    shortcut: bi

  - name: bing images
    engine: bing_images
    shortcut: bii

  - name: bing videos
    engine: bing_videos
    shortcut: biv

  # Baidu
  - name: baidu
    baidu_category: general
    categories: [general]
    engine: baidu
    shortcut: bd

  - name: baidu images
    baidu_category: images
    categories: [images]
    engine: baidu
    shortcut: bdi

  - name: baidu kaifa
    baidu_category: it
    categories: [it]
    engine: baidu
    shortcut: bdk

  # Yandex
  - name: yandex
    engine: yandex
    shortcut: ya
    categories: [general]

  - name: yandex images
    engine: yandex_images
    shortcut: yai
    categories: [images]

  # GitHub
  - name: github
    engine: github
    shortcut: gh
    categories: [it]

  # Stack Overflow
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    categories: [it]

  # ArXiv
  - name: arxiv
    engine: arxiv
    shortcut: ar
    categories: [science]

  # PyPI
  - name: pypi
    engine: pypi
    shortcut: pypi
    categories: [it]

  # npm
  - name: npm
    engine: npm
    shortcut: npm
    categories: [it]

  # 搜狗
  - name: sogou
    engine: sogou
    shortcut: sg
    categories: [general]

  - name: sogou images
    engine: sogou_images
    shortcut: sgi
    categories: [images]

  - name: sogou videos
    engine: sogou_videos
    shortcut: sgv
    categories: [videos]

  # 哔哩哔哩
  - name: bilibili
    engine: bilibili
    shortcut: bl
    categories: [videos]

  # 搜狗微信
  - name: sogou wechat
    engine: sogou_wechat
    shortcut: sgw
    categories: [general, news]

  # 爱奇艺
  - name: iqiyi
    engine: iqiyi
    shortcut: iq
    categories: [videos]

  # AcFun
  - name: acfun
    engine: acfun
    shortcut: acf
    categories: [videos]

  # Steam
  - name: steam
    engine: steam
    shortcut: stm
    categories: [general]

  # 夸克
  - name: quark
    quark_category: general
    categories: [general]
    engine: quark
    shortcut: qk

  - name: quark images
    quark_category: images
    categories: [images]
    engine: quark
    shortcut: qki

  # 360搜索
  - name: 360search
    engine: 360search
    shortcut: 360so
    categories: [general]
    timeout: 10.0

  - name: 360search videos
    engine: 360search_videos
    shortcut: 360sov
    categories: [videos]

  # Docker Hub
  - name: docker hub
    engine: docker_hub
    shortcut: dh
    categories: [it]

  # MDN
  - name: mdn
    shortcut: mdn
    engine: json_engine
    categories: [it]
    paging: true
    search_url: https://developer.mozilla.org/api/v1/search?q={query}&page={pageno}
    results_query: documents
    url_query: mdn_url
    url_prefix: https://developer.mozilla.org
    title_query: title
    content_query: summary

  # Hacker News
  - name: hackernews
    engine: hackernews
    shortcut: hn
    categories: [it]

  # GitLab
  - name: gitlab
    engine: gitlab
    base_url: https://gitlab.com
    shortcut: gl
    categories: [it]

  # 货币转换
  - name: currency
    engine: currency_convert
    shortcut: cc

  # OpenStreetMap
  - name: openstreetmap
    engine: openstreetmap
    shortcut: osm
    categories: [map]

  # 天气
  - name: openmeteo
    engine: open_meteo
    shortcut: om

doi_resolvers:
  oadoi.org: 'https://oadoi.org/'
  doi.org: 'https://doi.org/'
  sci-hub.se: 'https://sci-hub.se/'
  sci-hub.st: 'https://sci-hub.st/'
  sci-hub.ru: 'https://sci-hub.ru/'

default_doi_resolver: 'oadoi.org'
